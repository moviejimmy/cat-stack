<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>貓貓疊疊樂 · Neko Stack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --felt:#1c5a4a; --felt-dark:#123c32; --felt-line:#2a6f5c;
  --ivory:#fff8ea; --ivory-edge:#e9d2a8; --tile-side:#c79a63;
  --ink:#1f2b27; --gold:#f4b942; --gold-deep:#c9871a;
  --rose:#e6647a; --paper:#fdf6e6;
  --tile:64px; --half:32px; --lift:4px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  background:
    radial-gradient(ellipse 120% 90% at 50% 0%, var(--felt) 0%, var(--felt-dark) 100%);
  color:var(--paper);
  display:flex;flex-direction:column;align-items:center;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;
}
/* felt weave texture */
body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.35;
  background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.015) 0 2px,transparent 2px 4px),
  repeating-linear-gradient(-45deg,rgba(0,0,0,.03) 0 2px,transparent 2px 4px);}

#app{width:100%;max-width:560px;height:100%;display:flex;flex-direction:column;position:relative}

/* ---------- header ---------- */
#hud{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 4px;gap:8px;z-index:5}
#hud .stat{font-family:"Baloo 2","Noto Sans TC",sans-serif;font-weight:800;font-size:17px;
  background:rgba(0,0,0,.25);border:1px solid var(--felt-line);border-radius:999px;padding:6px 14px;white-space:nowrap}
#hud .stat b{color:var(--gold)}
#bossBanner{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.25);
  border:1px solid var(--gold-deep);border-radius:999px;padding:3px 12px 3px 4px}
#bossBanner img{width:46px;height:46px;border-radius:50%;background:var(--ivory);border:2px solid var(--gold)}
#bossBanner .crown{position:absolute;font-size:13px;transform:translate(20px,-16px) rotate(18deg)}
#bossBanner .who{font-size:14px;line-height:1.2}
#bossBanner .who b{color:var(--gold);font-size:17px}
#bossWrap{position:relative}

/* ---------- board ---------- */
#boardWrap{flex:1;position:relative;display:flex;align-items:center;justify-content:center;min-height:0;z-index:1}
#board{position:relative}
.tile{
  position:absolute;width:var(--tile);height:var(--tile);border-radius:12px;cursor:pointer;
  background:linear-gradient(160deg,#fffdf5 0%,var(--ivory) 55%,#f3e3c2 100%);
  box-shadow:0 var(--lift) 0 var(--tile-side), 0 calc(var(--lift) + 4px) 8px rgba(0,0,0,.45);
  border:1px solid var(--ivory-edge);
  display:flex;align-items:center;justify-content:center;
  transition:transform .12s ease, filter .2s ease, opacity .2s ease;
}
.tile:active{transform:translateY(2px)}
.tile .face{width:82%;height:82%;pointer-events:none;display:flex;align-items:center;justify-content:center}
.tile .face img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 2px 2px rgba(0,0,0,.18))}
.tile .face .emo{font-size:calc(var(--tile) * .62);line-height:1}
.tile.blocked{cursor:default;filter:brightness(.52) saturate(.7)}
.tile.blocked:active{transform:none}
.tile.bossTile::after{content:"👑";position:absolute;top:-9px;right:-6px;font-size:16px;
  filter:drop-shadow(0 1px 1px rgba(0,0,0,.5));transform:rotate(14deg)}
.tile.bossTile{border-color:var(--gold);box-shadow:0 var(--lift) 0 var(--gold-deep),0 calc(var(--lift) + 4px) 9px rgba(0,0,0,.5)}
.tile.facedown{background:linear-gradient(160deg,#2e7a63,#1d5747);border-color:#3f9077;cursor:default}
.tile.facedown .face{visibility:hidden}
.tile.facedown::before{content:"🐾";font-size:22px;opacity:.5}
.tile.flying{transition:left .32s cubic-bezier(.5,.1,.3,1.2), top .32s cubic-bezier(.5,.1,.3,1.2), width .32s, height .32s;z-index:900 !important}
@keyframes popOut{0%{transform:scale(1)}45%{transform:scale(1.22) rotate(-4deg)}100%{transform:scale(0);opacity:0}}
.tile.matched{animation:popOut .38s ease forwards}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* ---------- tray ---------- */
#trayZone{padding:6px 10px 10px;z-index:6}
#tray{
  height:calc(var(--tile) + 18px);border-radius:16px;position:relative;
  background:linear-gradient(180deg,#0e332a,#0a271f);
  border:2px solid var(--felt-line);
  box-shadow:inset 0 4px 10px rgba(0,0,0,.55), 0 2px 0 rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:center;gap:6px;padding:0 8px;
}
#tray.danger{border-color:var(--rose)}
#tray.shakeIt{animation:shake .3s ease 2}
.slot{width:var(--tile);height:var(--tile);border-radius:12px;border:1.5px dashed rgba(255,255,255,.14);flex:none}

/* ---------- tools ---------- */
#tools{display:flex;justify-content:center;gap:14px;padding:0 10px 12px;z-index:6}
.toolBtn{
  font-family:inherit;font-weight:800;font-size:16px;color:var(--paper);
  background:linear-gradient(180deg,#2a6f5c,#1c5245);border:1px solid #3f9077;border-radius:14px;
  padding:12px 18px;cursor:pointer;box-shadow:0 4px 0 #0d2e26;display:flex;align-items:center;gap:7px;
}
.toolBtn:active{transform:translateY(2px);box-shadow:0 1px 0 #0d2e26}
.toolBtn.used{opacity:.35;pointer-events:none;filter:grayscale(1)}
.toolBtn .ic{font-size:20px}
#btnHome{border-radius:50%;width:42px;height:42px;padding:0;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(0,0,0,.25);border:1px solid var(--felt-line);cursor:pointer;box-shadow:none}

/* ---------- overlays ---------- */
.overlay{position:absolute;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
  background:rgba(8,26,21,.78);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.show{opacity:1;pointer-events:auto}
.card{
  width:min(86%,380px);background:linear-gradient(170deg,#fffdf4,#f6e8c8);color:var(--ink);
  border-radius:22px;padding:26px 22px;text-align:center;position:relative;
  box-shadow:0 8px 0 var(--tile-side),0 18px 40px rgba(0,0,0,.5);
  transform:translateY(14px) scale(.96);transition:transform .3s cubic-bezier(.3,1.4,.5,1)}
.overlay.show .card{transform:none}
.card h1{font-family:"Baloo 2","Noto Sans TC",sans-serif;font-weight:900;font-size:30px;letter-spacing:.02em}
.card h2{font-weight:900;font-size:22px;margin-bottom:6px}
.card .sub{font-size:14px;opacity:.75;margin:4px 0 14px}
.card .big{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 50% 35%,#fff,#f0dcb2);
  border:4px solid var(--gold);margin:6px auto 10px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.card .big img{width:88%;height:88%;object-fit:contain;transform:translateY(6%)}
.card .big .crown2{position:absolute;top:-2px;right:2px;font-size:26px;transform:rotate(18deg);filter:drop-shadow(0 2px 2px rgba(0,0,0,.3))}
.speech{
  background:#fff;border:2px solid var(--ink);border-radius:14px;padding:10px 14px;font-weight:700;font-size:15px;
  position:relative;margin:12px 6px 16px;box-shadow:3px 3px 0 rgba(31,43,39,.15)}
.speech::before{content:"";position:absolute;top:-9px;left:50%;transform:translateX(-50%) rotate(45deg);
  width:14px;height:14px;background:#fff;border-left:2px solid var(--ink);border-top:2px solid var(--ink)}
.btnRow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.bigBtn{
  font-family:inherit;font-weight:900;font-size:17px;border:none;border-radius:14px;cursor:pointer;
  padding:12px 26px;color:#fff;background:linear-gradient(180deg,#f4b942,#d98f1c);box-shadow:0 4px 0 #a06a0d;color:#4a3200}
.bigBtn.green{background:linear-gradient(180deg,#2f8a6d,#1c5f49);box-shadow:0 4px 0 #113d2f;color:#eafff5}
.bigBtn:active{transform:translateY(3px);box-shadow:0 1px 0 #a06a0d}
.tip{font-size:13px;background:rgba(31,43,39,.07);border-radius:10px;padding:8px 12px;margin-top:14px;opacity:.85}
.rosterRow{display:flex;justify-content:center;gap:4px;flex-wrap:wrap;margin:10px 0 4px}
.rosterRow img{width:34px;height:34px;border-radius:9px;background:#fff;border:1.5px solid var(--ivory-edge)}
.statLine{display:flex;justify-content:center;gap:18px;font-weight:700;font-size:14px;margin:8px 0 14px}
.statLine b{font-family:"Baloo 2",sans-serif;font-size:18px;color:var(--gold-deep)}

/* toast */
#toast{position:absolute;left:50%;top:16%;transform:translate(-50%,-8px);z-index:60;pointer-events:none;
  background:rgba(20,46,38,.92);border:1.5px solid var(--gold);color:var(--paper);font-weight:700;font-size:14px;
  border-radius:999px;padding:8px 18px;opacity:0;transition:opacity .25s,transform .25s;white-space:nowrap}
#toast.show{opacity:1;transform:translate(-50%,0)}

/* confetti paw */
.paw{position:absolute;z-index:55;pointer-events:none;font-size:20px;animation:fall 1.4s ease-in forwards}
@keyframes fall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(46vh) rotate(220deg);opacity:0}}

@media (max-height:700px){:root{--tile:56px}}
@media (max-width:400px){:root{--tile:52px}}
@media (prefers-reduced-motion:reduce){
  .tile.flying{transition:none}.tile.matched{animation-duration:.01s}.paw{display:none}
}
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="stat">第 <b id="hudLevel">1</b> 關</div>
    <div id="bossWrap">
      <div id="bossBanner">
        <img id="bossImg" alt="boss">
        <div class="who">本關關主<br><b id="bossName">囡囡</b></div>
      </div>
    </div>
    <div class="stat">分數 <b id="hudScore">0</b></div>
    <button id="btnHome" title="回主選單">🏠</button>
  </div>

  <div id="boardWrap"><div id="board"></div></div>

  <div id="trayZone"><div id="tray"></div></div>

  <div id="tools">
    <button class="toolBtn" id="btnUndo"><span class="ic">↩️</span>退回</button>
    <button class="toolBtn" id="btnPop"><span class="ic">📤</span>彈出三張</button>
    <button class="toolBtn" id="btnShuffle"><span class="ic">🔀</span>洗牌</button>
    <button class="toolBtn" id="btnRedeal"><span class="ic">🔄</span>重發</button>
  </div>

  <div id="toast"></div>

  <!-- start screen -->
  <div class="overlay show" id="ovStart">
    <div class="card">
      <h1>貓貓疊疊樂</h1>
      <div class="sub">Neko Stack · 三消疊層挑戰</div>
      <div class="rosterRow" id="startRoster"></div>
      <div class="sub" style="margin-top:2px">八位貓主子輪流坐鎮做關主。<br>點選最上層的牌，集齊三張相同即可消除。<br>底部牌架只有 7 格 —— 塞滿就輸！</div>
      <div class="btnRow"><button class="bigBtn" id="btnStart">開始遊戲</button><button class="bigBtn green" id="btnContinue" style="display:none">繼續 第<span id="contLv"></span>關</button></div>
      <div class="btnRow" style="margin-top:10px"><button class="bigBtn green" id="btnBoard" style="font-size:15px;padding:9px 20px">🏆 排行榜</button></div>
      <div class="tip" id="bestTip"></div>
    </div>
  </div>

  <!-- level intro -->
  <div class="overlay" id="ovIntro">
    <div class="card">
      <h2>第 <span id="inLevel"></span> 關</h2>
      <div class="big"><img id="inBossImg" alt=""><span class="crown2">👑</span></div>
      <div class="sub">本關關主：<b id="inBossName"></b>（<span id="inBossTrait"></span>）</div>
      <div class="speech" id="inTaunt"></div>
      <div class="btnRow"><button class="bigBtn" id="btnGo">出牌！</button></div>
      <div class="tip" id="inTip"></div>
    </div>
  </div>

  <!-- win level -->
  <div class="overlay" id="ovWin">
    <div class="card">
      <h2>過關！🎉</h2>
      <div class="big"><img id="wBossImg" alt=""></div>
      <div class="speech" id="wPraise"></div>
      <div class="statLine"><span>本關得分 <b id="wScore"></b></span><span>總分 <b id="wTotal"></b></span></div>
      <div class="btnRow"><button class="bigBtn" id="btnNext">下一關 ➜</button></div>
    </div>
  </div>

  <!-- lose -->
  <div class="overlay" id="ovLose">
    <div class="card">
      <h2 style="color:#b5364d">牌架滿了…</h2>
      <div class="big" style="border-color:#b5364d"><img id="lBossImg" alt=""><span class="crown2">👑</span></div>
      <div class="speech" id="lTaunt"></div>
      <div class="statLine"><span>總分 <b id="lTotal"></b></span></div>
      <div class="btnRow">
        <button class="bigBtn" id="btnRetry">再挑戰</button>
        <button class="bigBtn green" id="btnMenu">回主選單</button>
      </div>
    </div>
  </div>

  <!-- leaderboard -->
  <div class="overlay" id="ovBoard">
    <div class="card">
      <h2>🏆 排行榜</h2>
      <div class="sub">以最高關數排名，同關比總分</div>
      <div id="boardList" style="max-height:46vh;overflow-y:auto;text-align:left;margin:10px 0 14px;font-size:15px"></div>
      <div class="btnRow">
        <button class="bigBtn green" id="btnEditName" style="font-size:14px;padding:9px 18px">✏️ 改名</button>
        <button class="bigBtn" id="btnBoardClose">關閉</button>
      </div>
    </div>
  </div>

  <!-- nickname -->
  <div class="overlay" id="ovName">
    <div class="card">
      <h2>你嘅暱稱</h2>
      <div class="sub">會顯示喺共享排行榜上</div>
      <input id="nameInput" maxlength="12" style="width:80%;font-family:inherit;font-size:18px;font-weight:700;text-align:center;
        padding:10px;border-radius:12px;border:2px solid var(--tile-side);background:#fff;color:var(--ink);margin:6px 0 16px" placeholder="例如：鏟屎官一號">
      <div class="btnRow"><button class="bigBtn" id="btnNameSave">儲存</button></div>
    </div>
  </div>

  <!-- all clear -->
  <div class="overlay" id="ovAll">
    <div class="card">
      <h2>🏆 全部通關！</h2>
      <div class="rosterRow" id="allRoster"></div>
      <div class="speech">八位主子一致認證：你係罐罐級鏟屎官！</div>
      <div class="statLine"><span>最終總分 <b id="aTotal"></b></span></div>
      <div class="btnRow"><button class="bigBtn" id="btnAgain">從頭再玩</button></div>
    </div>
  </div>
</div>

/* ================= UTIL ================= */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const $=s=>document.querySelector(s);
function shuffleArr(arr,rng){for(let i=arr.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}

/* ================= AUDIO ================= */
let AC=null;
function beep(f,d,type="sine",g=.12,when=0){
  try{
    if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(),ga=AC.createGain();
    o.type=type;o.frequency.value=f;o.connect(ga);ga.connect(AC.destination);
    const t=AC.currentTime+when;
    ga.gain.setValueAtTime(g,t);ga.gain.exponentialRampToValueAtTime(.001,t+d);
    o.start(t);o.stop(t+d+.02);
  }catch(e){}
}

/* ================= STATE ================= */
let S = null; // current level state
let totalScore = 0, curLevel = 1;
const SAVE_KEY = "nekoStackSave.v3";
function loadSave(){try{return JSON.parse(localStorage.getItem(SAVE_KEY))||{}}catch(e){return{}}}
function save(extra){
  const old=loadSave();
  localStorage.setItem(SAVE_KEY,JSON.stringify({
    level:curLevel,score:totalScore,
    best:Math.max(totalScore,old.best||0),
    bestLevel:(extra&&extra.bestLevel)||old.bestLevel||0,
    bestScore:Math.max((extra&&extra.bestScore)||0,old.bestScore||0,totalScore)
  }));
}

/* ================= GENERATION ================= */
function generateLevel(lv){
  const conf = levelConf(lv);
  const rng = mulberry32((lv*7919 + Math.floor(Math.random()*0x7fffffff))|0);
  const bossId = lv===LEVELS ? 7 : ((lv-1)%8)+1; // 咪咪 — the boss nobody expected

  // roster: boss + other cats + fillers
  const otherCats = CATS.filter(c=>c.id!==bossId).map(c=>"c"+c.id);
  shuffleArr(otherCats,rng);
  const fill = FILLERS.slice(); shuffleArr(fill,rng);
  const roster = ["c"+bossId];
  const pool = otherCats.concat(fill.map(e=>"e"+e));
  // interleave: prefer some cats, some fillers
  for(let i=0;roster.length<conf.types;i++) roster.push(pool[i]);

  // build tile multiset
  let typesArr=[];
  roster.forEach((t,idx)=>{
    const n = conf.triples * 3;
    for(let i=0;i<n;i++) typesArr.push(t);
  });
  shuffleArr(typesArr,rng);

  // buried boss: sink boss tiles low; even deeper from L4+
  {
    const bossType="c"+bossId;
    const bossTiles=typesArr.filter(t=>t===bossType);
    const rest=typesArr.filter(t=>t!==bossType);
    const frac = conf.deepBurial ? 0.85 : 0.7;
    const zone = conf.deepBurial ? 0.3 : 0.4;
    const deepN=Math.ceil(bossTiles.length*frac);
    const deepZone=Math.floor(rest.length*zone);
    for(let i=0;i<bossTiles.length;i++){
      const at = i<deepN ? Math.floor(rng()*deepZone)
                         : Math.floor(rng()*rest.length);
      rest.splice(at,0,bossTiles[i]);
    }
    typesArr=rest;
  }

  // reserve tiles for blind stacks (taken from the top of the deal = shallow tiles)
  const blindL=[],blindR=[],blindB=[];
  for(let i=0;i<conf.blind;i++){blindL.push(typesArr.pop());blindR.push(typesArr.pop());}
  for(let i=0;i<conf.stackB;i++){blindB.push(typesArr.pop());}

  // place remaining on layered board (half-unit grid, tile = 2x2 units)
  const W=12, H=13; // half units
  const tiles=[];
  let id=0;
  const perLayer = Math.ceil(typesArr.length/conf.layers);
  let k=0;
  for(let z=0; z<conf.layers && k<typesArr.length; z++){
    // shrink region slightly per layer for a mound shape
    const inset = Math.max(0, (conf.layers-1-z)); // lower layers wider
    const minX=0+Math.floor(inset*0.4), maxX=W-2-Math.floor(inset*0.4);
    const minY=0+Math.floor(inset*0.3), maxY=H-2-Math.floor(inset*0.3);
    const placed=[];
    let tries=0, want=Math.min(perLayer, typesArr.length-k);
    while(placed.length<want && tries<2200){
      tries++;
      const x=minX+Math.floor(rng()*(maxX-minX+1));
      const y=minY+Math.floor(rng()*(maxY-minY+1));
      if(placed.some(p=>Math.abs(p.x-x)<2 && Math.abs(p.y-y)<2)) continue;
      placed.push({x,y});
    }
    placed.forEach(p=>{
      tiles.push({id:id++,type:typesArr[k++],x:p.x,y:p.y,z,state:"board"});
    });
  }
  // any leftovers go on extra top layers, scanned onto a non-overlapping grid
  let zTop=conf.layers;
  while(k<typesArr.length){
    const placedTop=[];
    for(let y=1;y<=H-2 && k<typesArr.length;y+=2){
      for(let x=1;x<=W-2 && k<typesArr.length;x+=2){
        if(placedTop.some(p=>Math.abs(p.x-x)<2&&Math.abs(p.y-y)<2))continue;
        placedTop.push({x,y});
        tiles.push({id:id++,type:typesArr[k++],x,y,z:zTop,state:"board"});
      }
    }
    zTop++;
  }

  // blind stacks: vertical piles at sides + bottom-center, index 0 = bottom
  blindL.forEach((t,i)=>tiles.push({id:id++,type:t,stack:"L",si:i,state:"board"}));
  blindR.forEach((t,i)=>tiles.push({id:id++,type:t,stack:"R",si:i,state:"board"}));
  blindB.forEach((t,i)=>tiles.push({id:id++,type:t,stack:"B",si:i,state:"board"}));

  // tools: L20 = shuffle only; otherwise a random 2 of 3, re-rolled every attempt
  let tools;
  if(lv===LEVELS){
    tools={undo:false,pop:false,shuffle:true};
  }else{
    const keys=["undo","pop","shuffle"];
    const drop=keys[Math.floor(Math.random()*3)];
    tools={undo:true,pop:true,shuffle:true};
    tools[drop]=false;
  }

  return {lv, conf, bossId, tiles, tray:[], history:[], score:0,
          tools, over:false, W, H};
}

/* blocking rules */
function isBlocked(t){
  if(t.state!=="board") return false;
  if(t.stack){ // only topmost of its stack is free
    return S.tiles.some(o=>o.state==="board"&&o.stack===t.stack&&o.si>t.si);
  }
  return S.tiles.some(o=>o.state==="board" && !o.stack && o.z>t.z &&
    Math.abs(o.x-t.x)<2 && Math.abs(o.y-t.y)<2);
}
/* fog of war: buried tiles are face-down. Normal fog = 2+ layers deep; deep fog = any cover */
function isFogged(t){
  if(!S.conf.fog || t.stack || t.state!=="board") return false;
  const th = S.conf.deepFog ? 1 : 2;
  return S.tiles.some(o=>o.state==="board" && !o.stack && o.z>=t.z+th &&
    Math.abs(o.x-t.x)<2 && Math.abs(o.y-t.y)<2);
}

/* ================= RENDER ================= */
const board=$("#board"), tray=$("#tray");
let unit=28; // px per half-unit, computed on layout
function typeFace(type){
  if(type[0]==="c"){const id=+type.slice(1);return `<img src="${CAT_IMG[id]}" alt="${CATS[id-1].name}">`}
  return `<span class="emo">${type.slice(1)}</span>`;
}
function layout(){
  const wrap=$("#boardWrap");
  const availW=wrap.clientWidth-16, availH=wrap.clientHeight-10;
  // board spans W half-units wide + side stacks (2 units each side + gap)
  const cols=S.W+ (S.conf.blind?5:0); // extra room for stacks
  unit=Math.floor(Math.min(availW/cols, availH/(S.H+1)));
  unit=Math.max(16,Math.min(unit,34));
  const tilePx=unit*2;
  document.documentElement.style.setProperty("--tile",tilePx+"px");
  board.style.width=(S.W*unit + (S.conf.blind? 5*unit:0))+"px";
  board.style.height=(S.H*unit+unit + (S.conf.stackB? Math.floor(1.6*unit):0))+"px";
}
function posOf(t){
  const off=S.conf.blind? Math.floor(2.5*unit):0;
  if(t.stack==="B"){
    const x = off + Math.floor((S.W/2-1)*unit);
    const y = S.H*unit + Math.floor(0.4*unit) - t.si*6;
    return {left:x, top:y, z:200+t.si};
  }
  if(t.stack){
    const x = t.stack==="L" ? 0 : S.W*unit + off + Math.floor(0.5*unit);
    const y = Math.floor(S.H*unit*0.35) - t.si*6;
    return {left:x, top:y, z:100+t.si};
  }
  return {left:off + t.x*unit, top:t.y*unit - t.z*3, z:t.z*10 + t.y};
}
function render(){
  layout();
  board.innerHTML="";
  const bossType="c"+S.bossId;
  S.tiles.filter(t=>t.state==="board").forEach(t=>{
    const el=document.createElement("div");
    el.className="tile";
    const blocked=isBlocked(t);
    const fogged=isFogged(t);
    if(blocked)el.classList.add("blocked");
    if(t.type===bossType && !fogged && !(t.stack&&blocked))el.classList.add("bossTile");
    if((t.stack && blocked) || fogged)el.classList.add("facedown");
    // depth cue: thicker stacked side when tiles hide directly beneath
    if(!t.stack){
      const under=S.tiles.filter(o=>o.state==="board"&&!o.stack&&o.z<t.z&&
        Math.abs(o.x-t.x)<2&&Math.abs(o.y-t.y)<2).length;
      if(under>0){
        const d=Math.min(under,3);
        const side = t.type===bossType&&!fogged ? "var(--gold-deep)" : "var(--tile-side)";
        let sh="";
        for(let i=1;i<=d;i++)sh+=`0 ${4*i}px 0 ${i%2? side:"#a97f4e"}, `;
        el.style.boxShadow=sh+`0 ${4*d+5}px 9px rgba(0,0,0,.5)`;
        el.style.marginTop=(-(d-1)*1)+"px";
      }
    }
    const p=posOf(t);
    el.style.left=p.left+"px";el.style.top=p.top+"px";el.style.zIndex=p.z;
    el.innerHTML=`<div class="face">${typeFace(t.type)}</div>`;
    el.dataset.id=t.id;
    if(!blocked)el.addEventListener("pointerdown",()=>pick(t.id),{passive:true});
    board.appendChild(el);
  });
  renderTray();
  $("#hudLevel").textContent=S.lv;
  $("#hudScore").textContent=totalScore+S.score;
}
function renderTray(){
  tray.innerHTML="";
  for(let i=0;i<TRAY_SIZE;i++){
    const slot=document.createElement("div");slot.className="slot";
    const t=S.tray[i];
    if(t){
      const el=document.createElement("div");
      el.className="tile";el.style.position="relative";el.style.boxShadow="0 3px 0 var(--tile-side)";
      if(t.type==="c"+S.bossId)el.classList.add("bossTile");
      el.innerHTML=`<div class="face">${typeFace(t.type)}</div>`;
      slot.appendChild(el);slot.style.border="none";
    }
    tray.appendChild(slot);
  }
  tray.classList.toggle("danger", S.tray.length>=TRAY_SIZE-1);
  ["undo","pop","shuffle"].forEach(k=>{
    $("#btn"+k[0].toUpperCase()+k.slice(1)).classList.toggle("used",!S.tools[k]);
  });
}

/* ================= GAME ACTIONS ================= */
function pick(id){
  if(S.over)return;
  const t=S.tiles.find(x=>x.id===id);
  if(!t||t.state!=="board"||isBlocked(t))return;
  if(S.tray.length>=TRAY_SIZE)return;
  sfx.pick();
  t.state="tray";
  // insert grouped
  let idx=-1;
  for(let i=S.tray.length-1;i>=0;i--){if(S.tray[i].type===t.type){idx=i;break}}
  if(idx>=0)S.tray.splice(idx+1,0,t);else S.tray.push(t);
  S.history.push(t.id);
  // check triple
  const same=S.tray.filter(x=>x.type===t.type);
  if(same.length>=3){
    const trio=same.slice(0,3);
    trio.forEach(x=>{x.state="gone";S.tray.splice(S.tray.indexOf(x),1)});
    S.history=S.history.filter(h=>!trio.some(x=>x.id===h));
    S.score+=30;
    if(t.type==="c"+S.bossId){bossBonus()}else{sfx.match()}
  }
  afterMove();
}
function bossBonus(){
  sfx.boss();
  S.score+=60;
  const bossName=CATS[S.bossId-1].name;
  const onBoard=S.tiles.filter(t=>t.state==="board"&&!t.stack);
  const boardBy={};
  onBoard.forEach(t=>{(boardBy[t.type]=boardBy[t.type]||[]).push(t)});
  // 1) prefer rescuing the type clogging the tray
  const trayBy={};
  S.tray.forEach(t=>{(trayBy[t.type]=trayBy[t.type]||[]).push(t)});
  let target=null;
  Object.keys(trayBy)
    .sort((a,b)=>trayBy[b].length-trayBy[a].length)
    .some(k=>{
      const need=3-trayBy[k].length;
      if((boardBy[k]||[]).length>=need){target=k;return true}
      return false;
    });
  if(target){
    const fromTray=trayBy[target];
    fromTray.forEach(t=>{t.state="gone";S.tray.splice(S.tray.indexOf(t),1)});
    boardBy[target].sort((a,b)=>a.z-b.z).slice(0,3-fromTray.length).forEach(t=>t.state="gone");
    S.history=S.history.filter(h=>!fromTray.some(x=>x.id===h));
    S.score+=30;
    toast(`👑 ${bossName} 出手！清走塞住牌架嘅牌`);
  }else{
    // 2) fallback: clear a random buried triple from the board
    const cand=Object.keys(boardBy).filter(k=>boardBy[k].length>=3);
    if(cand.length){
      const k=cand[Math.floor(Math.random()*cand.length)];
      boardBy[k].sort((a,b)=>a.z-b.z).slice(0,3).forEach(t=>t.state="gone");
      S.score+=30;
      toast(`👑 ${bossName} 出手！幫你清走一組牌`);
    }else{
      toast(`👑 ${bossName} 賞你 60 分！`);
    }
  }
  pawBurst();
}
function afterMove(){
  render();save();
  const left=S.tiles.filter(t=>t.state==="board").length;
  if(left===0 && S.tray.length===0){winLevel();return}
  if(S.tray.length>=TRAY_SIZE){
    tray.classList.add("shakeIt");
    setTimeout(()=>loseLevel(),650);
  }
}

/* tools */
$("#btnUndo").addEventListener("click",()=>{
  if(!S.tools.undo||S.over||!S.history.length)return;
  const id=S.history.pop();
  const t=S.tiles.find(x=>x.id===id);
  if(!t)return;
  S.tray.splice(S.tray.indexOf(t),1);
  t.state="board";
  if(t.stack===undefined && t.x===undefined){} // safety
  S.tools.undo=false;sfx.tool();render();
});
$("#btnPop").addEventListener("click",()=>{
  if(!S.tools.pop||S.over||S.tray.length<1)return;
  // eject up to 3 tiles back to board top layer front
  const n=Math.min(3,S.tray.length);
  const maxZ=Math.max(0,...S.tiles.filter(t=>t.state==="board"&&!t.stack).map(t=>t.z))+1;
  for(let i=0;i<n;i++){
    const t=S.tray.shift();
    t.state="board";t.stack=undefined;
    t.z=maxZ;t.x=2+i*4;t.y=S.H-2;
    S.history=S.history.filter(h=>h!==t.id);
  }
  S.tools.pop=false;sfx.tool();render();
});
$("#btnShuffle").addEventListener("click",()=>{
  if(!S.tools.shuffle||S.over)return;
  const onBoard=S.tiles.filter(t=>t.state==="board");
  const types=onBoard.map(t=>t.type);
  for(let i=types.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[types[i],types[j]]=[types[j],types[i]]}
  onBoard.forEach((t,i)=>t.type=types[i]);
  S.tools.shuffle=false;sfx.tool();render();
});

function toast(msg){
  const el=$("#toast");el.textContent=msg;el.classList.add("show");
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),1800);
}
function pawBurst(){
  const wrap=$("#boardWrap");
  for(let i=0;i<10;i++){
    const p=document.createElement("div");p.className="paw";p.textContent=Math.random()<.5?"🐾":"✨";
    p.style.left=(10+Math.random()*80)+"%";p.style.top=(5+Math.random()*20)+"%";
    p.style.animationDelay=(Math.random()*.3)+"s";
    wrap.appendChild(p);setTimeout(()=>p.remove(),1800);
  }
}

window.addEventListener("resize",()=>{if(S&&!S.over)render()});
initStart();
</script>
